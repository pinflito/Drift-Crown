<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Drift Crown GP</title>
  <style>
    :root {
      --panel: rgba(10, 14, 18, 0.82);
      --line: rgba(255,255,255,0.09);
      --text: #f5f7fa;
      --muted: #aeb8c4;
      --accent: #ffd54a;
      --accent2: #72d7ff;
      --shadow: rgba(0,0,0,0.38);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--text);
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1a2230 0%, #0b1016 55%, #05070a 100%);
      touch-action: none;
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }
    .hud {
      position: fixed;
      inset: 14px 14px auto 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      z-index: 20;
      pointer-events: none;
    }
    .leftCol, .rightCol {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .panel {
      min-width: 200px;
      padding: 12px 14px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 28px var(--shadow);
    }
    .panel h1 {
      margin: 0 0 8px;
      font-size: 14px;
      letter-spacing: 0.14em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .stat {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      font-size: 14px;
      margin: 5px 0;
    }
    .stat span:last-child { font-weight: 800; }
    .help {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-align: right;
      min-width: 250px;
    }
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      background: rgba(5, 7, 10, 0.64);
      backdrop-filter: blur(7px);
    }
    .card {
      width: min(96vw, 960px);
      max-height: 92vh;
      overflow: auto;
      padding: 28px;
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(17,23,30,0.96), rgba(9,13,17,0.97));
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 32px 90px rgba(0,0,0,0.48);
      text-align: center;
    }
    .eyebrow {
      color: var(--accent2);
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 800;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: clamp(34px, 6vw, 56px);
      line-height: 0.95;
    }
    .card p {
      margin: 10px auto;
      max-width: 700px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    .difficultyLabel {
      margin-top: 18px;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 800;
    }
    .difficultyRow, .btnRow {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .diffBtn, button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      color: var(--text);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.09);
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }
    .diffBtn:hover, button:hover { transform: translateY(-1px); }
    .diffBtn.active, button.primary {
      background: linear-gradient(180deg, #ffe580, #ffcb2e);
      color: #1a1607;
      border-color: transparent;
      box-shadow: 0 10px 24px rgba(255, 203, 46, 0.3);
    }
    button[disabled] {
      opacity: 0.48;
      cursor: default;
      transform: none !important;
    }
    .tag {
      margin-top: 14px;
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(114,215,255,0.12);
      border: 1px solid rgba(114,215,255,0.26);
      color: #c7f0ff;
      font-size: 13px;
      font-weight: 700;
    }
    .tag.gold {
      background: rgba(255,213,74,0.12);
      border-color: rgba(255,213,74,0.28);
      color: #ffe69a;
    }
    .tagRow {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 14px 0 8px;
    }
    .countdown {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 28;
      pointer-events: none;
      font-size: clamp(80px, 18vw, 160px);
      font-weight: 900;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 14px 40px rgba(0,0,0,0.45);
    }
    .mobileControls {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 24;
      display: none;
      justify-content: space-between;
      align-items: end;
      padding: 0 max(14px, env(safe-area-inset-left)) 0 max(14px, env(safe-area-inset-right));
      pointer-events: none;
    }
    .controlCluster {
      display: grid;
      grid-template-columns: repeat(3, 72px);
      grid-template-rows: repeat(2, 72px);
      gap: 10px;
      pointer-events: auto;
    }
    .touchBtn {
      border-radius: 20px;
      background: rgba(10,14,18,0.82);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      font-size: 26px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      box-shadow: 0 12px 24px rgba(0,0,0,0.28);
    }
    .touchBtn.active {
      background: rgba(255, 213, 74, 0.2);
      border-color: rgba(255, 213, 74, 0.5);
      transform: scale(0.97);
    }
    .blank { visibility: hidden; }
    .mobileHint {
      display: none;
      margin-top: 10px;
      font-size: 13px;
      color: #cfe8ff;
      opacity: 0.92;
    }
    .shopGrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
      text-align: left;
    }
    .shopItem {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
    }
    .shopItemTop {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 8px;
    }
    .shopItem h3 {
      margin: 0;
      font-size: 18px;
    }
    .shopItem small {
      color: var(--muted);
      font-size: 12px;
    }
    .shopItem p {
      margin: 8px 0 12px;
      font-size: 14px;
      max-width: none;
    }
    .levelBar {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }
    .levelDot {
      height: 8px;
      flex: 1;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
    }
    .levelDot.on {
      background: linear-gradient(90deg, #72d7ff, #ffd54a);
    }
    .costLine {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .raceSummary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }
    .summaryBox {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 12px;
    }
    .summaryBox strong {
      display: block;
      font-size: 21px;
      margin-top: 4px;
      color: var(--text);
    }
    .summaryBox span {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    @media (max-width: 920px), (pointer: coarse) {
      .hud {
        inset: max(10px, env(safe-area-inset-top)) 10px auto 10px;
        gap: 8px;
      }
      .leftCol, .rightCol {
        flex-direction: column;
        gap: 8px;
      }
      .panel {
        min-width: 0;
        padding: 10px 12px;
      }
      .help {
        min-width: 0;
        font-size: 12px;
      }
      .card {
        padding: 22px 18px;
        border-radius: 24px;
      }
      .mobileControls {
        display: flex;
      }
      .mobileHint {
        display: block;
      }
      .shopGrid {
        grid-template-columns: 1fr;
      }
      .raceSummary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 560px), (pointer: coarse) {
      .hud {
        inset: max(8px, env(safe-area-inset-top)) 8px auto 8px;
      }
      .panel {
        padding: 8px 10px;
      }
      .panel h1 {
        font-size: 12px;
      }
      .stat {
        font-size: 12px;
      }
      .controlCluster {
        grid-template-columns: repeat(3, 78px);
        grid-template-rows: repeat(2, 78px);
      }
      .touchBtn {
        font-size: 28px;
      }
      .raceSummary {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="leftCol">
      <div class="panel">
        <h1>Carrera</h1>
        <div class="stat"><span>Velocidad</span><span id="speedStat">0 km/h</span></div>
        <div class="stat"><span>Vuelta</span><span id="lapStat">0 / 3</span></div>
        <div class="stat"><span>Posición</span><span id="posStat">4 / 4</span></div>
        <div class="stat"><span>Tiempo</span><span id="timeStat">00:00.0</span></div>
      </div>
      <div class="panel">
        <h1>Gran Premio</h1>
        <div class="stat"><span>Mapa</span><span id="mapStat">—</span></div>
        <div class="stat"><span>Dificultad</span><span id="diffStat">Normal</span></div>
        <div class="stat"><span>Puntos</span><span id="creditsStat">0</span></div>
        <div class="stat"><span>Carrera</span><span id="raceStat">1</span></div>
      </div>
    </div>
    <div class="rightCol">
      <div class="panel help">
        <div><strong>Ordenador</strong>: ratón para dirigir</div>
        <div><strong>Clic izq</strong>: acelerar · <strong>Clic der</strong>: frenar</div>
        <div><strong>Móvil</strong>: botones táctiles para girar, acelerar y frenar</div>
        <div><strong>R</strong>: reiniciar carrera actual</div>
      </div>
    </div>
  </div>

  <div class="countdown" id="countdown">3</div>

  <div class="mobileControls" aria-hidden="true">
    <div class="controlCluster">
      <div class="touchBtn blank"></div>
      <div class="touchBtn" data-key="up">▲</div>
      <div class="touchBtn blank"></div>
      <div class="touchBtn" data-key="left">◀</div>
      <div class="touchBtn" data-key="down">▼</div>
      <div class="touchBtn" data-key="right">▶</div>
    </div>
    <div class="controlCluster" style="grid-template-columns: repeat(2, 88px); grid-template-rows: repeat(1, 88px);">
      <div class="touchBtn" data-key="brake">BRAKE</div>
      <div class="touchBtn" data-key="gas">GAS</div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="card" id="overlayCard"></div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const speedStat = document.getElementById('speedStat');
    const lapStat = document.getElementById('lapStat');
    const posStat = document.getElementById('posStat');
    const timeStat = document.getElementById('timeStat');
    const mapStat = document.getElementById('mapStat');
    const diffStat = document.getElementById('diffStat');
    const creditsStat = document.getElementById('creditsStat');
    const raceStat = document.getElementById('raceStat');
    const overlay = document.getElementById('overlay');
    const overlayCard = document.getElementById('overlayCard');
    const countdownEl = document.getElementById('countdown');

    let W = canvas.width = window.innerWidth;
    let H = canvas.height = window.innerHeight;
    let startTime = 0;
    let elapsed = 0;
    let raceToken = 0;

    const keys = { up: false, down: false, left: false, right: false, gas: false, brake: false };
    const mouse = { x: W * 0.5, y: H * 0.5, left: false, right: false, active: true };

    const difficultySettings = {
      easy:   { label: 'Fácil', aiSpeed: 0.96, aiAccel: 0.96, aiTurn: 0.96, aiLookAhead: 0.10, aiPush: 0.85, reward: 0.9 },
      normal: { label: 'Normal', aiSpeed: 1.16, aiAccel: 1.10, aiTurn: 1.10, aiLookAhead: 0.16, aiPush: 0.98, reward: 1.2 },
      hard:   { label: 'Difícil', aiSpeed: 1.45, aiAccel: 1.32, aiTurn: 1.30, aiLookAhead: 0.23, aiPush: 1.14, reward: 1.65 }
    };

    const maps = [
      { name: 'Monarch GP', theme: 'sunset', scale: 1.10, roadWidth: 220, stretchX: 1.45, stretchY: 0.82, warpA: 0.18, warpB: 0.10, warpC: 0.05, phase: 0.10, scenery: 'palms' },
      { name: 'Midnight Marina GP', theme: 'neon', scale: 1.16, roadWidth: 215, stretchX: 1.52, stretchY: 0.80, warpA: 0.16, warpB: 0.12, warpC: 0.07, phase: 0.70, scenery: 'lights' },
      { name: 'Emerald Grand Loop', theme: 'forest', scale: 1.18, roadWidth: 220, stretchX: 1.58, stretchY: 0.84, warpA: 0.20, warpB: 0.09, warpC: 0.06, phase: 1.10, scenery: 'trees' },
      { name: 'Imperial Desert GP', theme: 'desert', scale: 1.20, roadWidth: 225, stretchX: 1.62, stretchY: 0.78, warpA: 0.17, warpB: 0.14, warpC: 0.05, phase: 1.80, scenery: 'rocks' },
      { name: 'Blue Glacier Circuit', theme: 'neon', scale: 1.22, roadWidth: 210, stretchX: 1.54, stretchY: 0.79, warpA: 0.15, warpB: 0.15, warpC: 0.08, phase: 2.30, scenery: 'lights' },
      { name: 'Canyon Crown Prix', theme: 'desert', scale: 1.26, roadWidth: 230, stretchX: 1.70, stretchY: 0.77, warpA: 0.22, warpB: 0.10, warpC: 0.06, phase: 2.80, scenery: 'rocks' },
      { name: 'Jungle Sovereign', theme: 'forest', scale: 1.24, roadWidth: 220, stretchX: 1.64, stretchY: 0.83, warpA: 0.19, warpB: 0.11, warpC: 0.07, phase: 3.10, scenery: 'trees' },
      { name: 'Golden Mirage GP', theme: 'sunset', scale: 1.28, roadWidth: 235, stretchX: 1.76, stretchY: 0.80, warpA: 0.23, warpB: 0.10, warpC: 0.05, phase: 3.60, scenery: 'palms' },
      { name: 'Nocturne Ring', theme: 'neon', scale: 1.20, roadWidth: 215, stretchX: 1.56, stretchY: 0.78, warpA: 0.16, warpB: 0.13, warpC: 0.08, phase: 4.10, scenery: 'lights' },
      { name: 'Verdant Royal Circuit', theme: 'forest', scale: 1.30, roadWidth: 230, stretchX: 1.80, stretchY: 0.84, warpA: 0.22, warpB: 0.10, warpC: 0.06, phase: 4.50, scenery: 'trees' },
      { name: 'Solar Apex GP', theme: 'sunset', scale: 1.34, roadWidth: 240, stretchX: 1.88, stretchY: 0.82, warpA: 0.24, warpB: 0.11, warpC: 0.06, phase: 5.00, scenery: 'palms' },
      { name: 'Titan International', theme: 'desert', scale: 1.38, roadWidth: 245, stretchX: 1.96, stretchY: 0.80, warpA: 0.26, warpB: 0.10, warpC: 0.07, phase: 5.50, scenery: 'rocks' }
    ];

    const upgradeDefs = [
      { id: 'engine', title: 'Motor', desc: '+ aceleración y un poco de salida', baseCost: 55, max: 6 },
      { id: 'handling', title: 'Dirección', desc: '+ giro y respuesta del coche', baseCost: 50, max: 6 },
      { id: 'topSpeed', title: 'Turbo', desc: '+ velocidad máxima', baseCost: 70, max: 6 },
      { id: 'recovery', title: 'Suspensión', desc: '+ menos castigo al salirte del asfalto', baseCost: 60, max: 6 }
    ];

    const state = {
      mode: 'menu',
      difficulty: 'normal',
      currentMapIndex: Math.floor(Math.random() * maps.length),
      result: null
    };

    const session = {
      credits: 0,
      raceNumber: 1,
      upgrades: { engine: 0, handling: 0, topSpeed: 0, recovery: 0 }
    };

    const track = {
      cx: 0,
      cy: 0,
      roadWidth: 220,
      baseA: 3000,
      baseB: 1200,
      samples: [],
      bounds: { minX: -3200, maxX: 3200, minY: -1600, maxY: 1600 },
      map: maps[state.currentMapIndex]
    };

    const camera = { x: 0, y: 0, zoom: 0.46 };
    const particles = [];
    let player = null;
    let rivals = [];
    let cars = [];

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function rand(min, max) { return min + Math.random() * (max - min); }

    function getBaseZoom() {
      return (window.innerWidth <= 920 || matchMedia('(pointer: coarse)').matches) ? 0.24 : 0.30;
    }

    function chooseRandomMap() {
      let next = state.currentMapIndex;
      while (maps.length > 1 && next === state.currentMapIndex) {
        next = Math.floor(Math.random() * maps.length);
      }
      state.currentMapIndex = next;
      track.map = maps[next];
      buildTrack();
      updateHUD();
    }

    function buildTrack() {
      track.map = maps[state.currentMapIndex];
      track.cx = 0;
      track.cy = 0;
      track.baseA = 2600 * track.map.scale * track.map.stretchX;
      track.baseB = 1100 * track.map.scale * track.map.stretchY;
      track.roadWidth = track.map.roadWidth;
      sampleTrack();
      camera.zoom = getBaseZoom();
    }

    function centerPoint(angle) {
      const m = track.map;
      const rx = track.baseA * (1 + m.warpA * Math.cos(2 * angle + m.phase) + m.warpB * Math.sin(3 * angle - m.phase * 0.7));
      const ry = track.baseB * (1 + (m.warpA * 0.55) * Math.sin(2 * angle - m.phase * 0.8) - m.warpC * Math.cos(4 * angle + m.phase * 0.5));
      return {
        x: track.cx + Math.cos(angle) * rx,
        y: track.cy + Math.sin(angle) * ry
      };
    }

    function tangentAngleOnTrack(angle) {
      const d = 0.003;
      const p1 = centerPoint(angle - d);
      const p2 = centerPoint(angle + d);
      return Math.atan2(p2.y - p1.y, p2.x - p1.x);
    }

    function sampleTrack() {
      track.samples = [];
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      const total = 420;
      for (let i = 0; i <= total; i++) {
        const angle = (i / total) * Math.PI * 2;
        const p = centerPoint(angle);
        const pPrev = centerPoint(angle - 0.003);
        const pNext = centerPoint(angle + 0.003);
        const tangent = Math.atan2(pNext.y - pPrev.y, pNext.x - pPrev.x);
        track.samples.push({ angle, x: p.x, y: p.y, tangent });
        minX = Math.min(minX, p.x);
        minY = Math.min(minY, p.y);
        maxX = Math.max(maxX, p.x);
        maxY = Math.max(maxY, p.y);
      }
      track.bounds = { minX, minY, maxX, maxY };
    }

    function getClosestTrackPoint(x, y) {
      let best = track.samples[0];
      let bestD = Infinity;
      for (let i = 0; i < track.samples.length; i++) {
        const s = track.samples[i];
        const dx = x - s.x;
        const dy = y - s.y;
        const d = dx * dx + dy * dy;
        if (d < bestD) {
          bestD = d;
          best = s;
        }
      }
      return { sample: best, dist: Math.sqrt(bestD) };
    }

    function angleToProgress(angle) {
      let p = angle + Math.PI / 2;
      while (p < 0) p += Math.PI * 2;
      while (p >= Math.PI * 2) p -= Math.PI * 2;
      return p / (Math.PI * 2);
    }

    function normalizeAngle(a) {
      while (a > Math.PI) a -= Math.PI * 2;
      while (a < -Math.PI) a += Math.PI * 2;
      return a;
    }

    function pointOnMid(angle, laneOffset = 0) {
      const p = centerPoint(angle);
      const t = tangentAngleOnTrack(angle);
      const normalX = -Math.sin(t);
      const normalY = Math.cos(t);
      return {
        x: p.x + normalX * laneOffset,
        y: p.y + normalY * laneOffset
      };
    }

    function tangentAngleOnEllipse(angle) {
      return tangentAngleOnTrack(angle);
    }

    function getUpgradeLevel(id) {
      return session.upgrades[id] || 0;
    }

    function getUpgradeCost(id) {
      const def = upgradeDefs.find(u => u.id === id);
      const level = getUpgradeLevel(id);
      return Math.round(def.baseCost * (1 + level * 0.55));
    }

    function createCar({ angle, laneOffset, color, ai = false, skill = 1 }) {
      const p = pointOnMid(angle, laneOffset);
      const diff = difficultySettings[state.difficulty];
      const heading = tangentAngleOnEllipse(
        angle,
        track.laneMidA + laneOffset,
        track.laneMidB + laneOffset * track.map.laneCurve
      );
      const engineLv = getUpgradeLevel('engine');
      const handlingLv = getUpgradeLevel('handling');
      const topSpeedLv = getUpgradeLevel('topSpeed');
      const recoveryLv = getUpgradeLevel('recovery');

      return {
        x: p.x,
        y: p.y,
        w: 22,
        h: 38,
        angle: heading,
        steer: 0,
        speed: 0,
        maxSpeed: ai ? (6.0 + skill * 0.42) * diff.aiSpeed : 5.6 + topSpeedLv * 0.28,
        accel: ai ? (0.11 + skill * 0.01) * diff.aiAccel : 0.115 + engineLv * 0.012,
        brake: ai ? 0.12 : 0.14 + recoveryLv * 0.006,
        turnRate: ai ? 0.023 * diff.aiTurn : 0.026 + handlingLv * 0.0026,
        drag: ai ? 0.992 : Math.min(0.994, 0.990 + topSpeedLv * 0.0006),
        offDrag: ai ? 0.90 : Math.min(0.96, 0.86 + recoveryLv * 0.016),
        color,
        ai,
        skill,
        laps: 0,
        progress: angleToProgress(angle),
        lastProgress: angleToProgress(angle)
      };
    }

    function resetCars() {
      player = createCar({ angle: -Math.PI / 2 + 0.03, laneOffset: -40, color: '#4ad0ff', ai: false });
      rivals = [
        createCar({ angle: -Math.PI / 2 - 0.08, laneOffset: 20, color: '#ff6b6b', ai: true, skill: 1.00 }),
        createCar({ angle: -Math.PI / 2 - 0.16, laneOffset: -75, color: '#9bff6f', ai: true, skill: 1.12 }),
        createCar({ angle: -Math.PI / 2 - 0.24, laneOffset: 85, color: '#ffd54a', ai: true, skill: 1.22 })
      ];
      cars = [player, ...rivals];
      particles.length = 0;
      elapsed = 0;
      camera.x = player.x;
      camera.y = player.y;
      updateHUD();
    }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      buildTrack();
      resetCars();
    }

    function trackFieldValue(x, y) {
      const closest = getClosestTrackPoint(x, y);
      return {
        dist: closest.dist,
        onRoad: closest.dist <= track.roadWidth * 0.5,
        sample: closest.sample
      };
    }

    function nearestAngleOnTrack(x, y) {
      return getClosestTrackPoint(x, y).sample.angle;
    }

    function movePlayer(car) {
      const accelerating = keys.up || keys.gas || mouse.left;
      const braking = keys.down || keys.brake || mouse.right;
      let steerInput = 0;
      const usingTouchSteering = keys.left || keys.right;

      if (mouse.active && !usingTouchSteering) {
        const worldMouseX = camera.x + (mouse.x - W / 2) / camera.zoom;
        const worldMouseY = camera.y + (mouse.y - H / 2) / camera.zoom;
        const desiredAngle = Math.atan2(worldMouseY - car.y, worldMouseX - car.x);
        const diff = normalizeAngle(desiredAngle - car.angle);
        steerInput = clamp(diff / 0.9, -1, 1);
      }

      if (keys.left) steerInput -= 1;
      if (keys.right) steerInput += 1;
      steerInput = clamp(steerInput, -1, 1);

      const speedFactor = clamp(Math.abs(car.speed) / 2.8, 0.18, 1);
      car.steer = lerp(car.steer, steerInput, usingTouchSteering ? 0.28 : 0.18);
      car.angle += car.steer * car.turnRate * speedFactor;

      if (accelerating) car.speed += car.accel;
      if (braking) car.speed -= car.brake;
      if (!accelerating && !braking) car.speed *= 0.988;
      car.speed = clamp(car.speed, -1.2, car.maxSpeed);
    }

    function moveAI(car) {
      const diffCfg = difficultySettings[state.difficulty];
      const targetAngle = nearestAngleOnTrack(car.x, car.y);
      const lookAhead = diffCfg.aiLookAhead + car.skill * 0.020;
      const targetPoint = pointOnMid(targetAngle + lookAhead, 0);
      const desired = Math.atan2(targetPoint.y - car.y, targetPoint.x - car.x);
      const diff = normalizeAngle(desired - car.angle);
      const steerDivisor = state.difficulty === 'hard' ? 0.50 : state.difficulty === 'normal' ? 0.62 : 0.78;
      const steerInput = clamp(diff / steerDivisor, -1, 1);

      car.steer = lerp(car.steer, steerInput, state.difficulty === 'hard' ? 0.27 : state.difficulty === 'normal' ? 0.21 : 0.15);
      const speedFactor = clamp(Math.abs(car.speed) / 2.6, 0.22, 1);
      car.angle += car.steer * car.turnRate * speedFactor;

      const road = trackFieldValue(car.x, car.y);
      const difficultyBonus = state.difficulty === 'hard' ? 0.06 : state.difficulty === 'normal' ? 0.03 : 0;
      const basePush = diffCfg.aiPush + difficultyBonus + Math.sin(performance.now() * 0.0012 + car.skill) * 0.012;
      const targetSpeed = road.onRoad
        ? car.maxSpeed * clamp(basePush, 0.74, state.difficulty === 'hard' ? 1.18 : state.difficulty === 'normal' ? 1.10 : 0.98)
        : car.maxSpeed * 0.38;

      if (car.speed < targetSpeed) car.speed += car.accel;
      else car.speed *= 0.993;
      car.speed = clamp(car.speed, 0, car.maxSpeed);
    }

    function updateCarPhysics(car) {
      const road = trackFieldValue(car.x, car.y);
      car.x += Math.cos(car.angle) * car.speed;
      car.y += Math.sin(car.angle) * car.speed;
      car.speed *= road.onRoad ? car.drag : car.offDrag;

      if (!road.onRoad && Math.random() < 0.24) {
        spawnDust(car);
      }

      constrainCarToTrack(car);
      updateProgress(car);
    }

    function constrainCarToTrack(car) {
      const road = trackFieldValue(car.x, car.y);
      if (road.onRoad) return;
      const p = road.sample;
      const pull = clamp((road.dist - track.roadWidth * 0.48) / 120, 0.08, 0.24);
      car.x = lerp(car.x, p.x, pull);
      car.y = lerp(car.y, p.y, pull);
    }

    function updateProgress(car) {
      const angle = nearestAngleOnTrack(car.x, car.y);
      const prog = angleToProgress(angle);

      if (car.lastProgress > 0.85 && prog < 0.15) {
        car.laps += 1;
        if (car === player && car.laps >= 3 && state.mode === 'running') {
          finishRace();
        }
      }
      if (car.lastProgress < 0.15 && prog > 0.85 && car.laps > 0) {
        car.laps -= 1;
      }
      car.lastProgress = prog;
      car.progress = prog;
    }

    function rankingValue(car) {
      return car.laps + car.progress;
    }

    function rankingPosition() {
      const ranking = [...cars].sort((a, b) => rankingValue(b) - rankingValue(a));
      return ranking.indexOf(player) + 1;
    }

    function computeReward(position) {
      const baseByPosition = [100, 65, 40, 20];
      const placement = baseByPosition[position - 1] || 15;
      const diffMult = difficultySettings[state.difficulty].reward;
      const raceBonus = Math.min(70, (session.raceNumber - 1) * 5);
      return Math.round((placement + raceBonus) * diffMult);
    }

    function formatTime(ms) {
      const totalSeconds = ms / 1000;
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = Math.floor(totalSeconds % 60);
      const tenths = Math.floor((totalSeconds % 1) * 10);
      return String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0') + '.' + tenths;
    }

    function updateHUD() {
      if (!player) return;
      speedStat.textContent = Math.round(Math.abs(player.speed) * 86) + ' km/h';
      lapStat.textContent = Math.min(player.laps, 3) + ' / 3';
      const ranking = [...cars].sort((a, b) => rankingValue(b) - rankingValue(a));
      posStat.textContent = (ranking.indexOf(player) + 1) + ' / ' + cars.length;
      timeStat.textContent = formatTime(elapsed);
      mapStat.textContent = track.map.name;
      diffStat.textContent = difficultySettings[state.difficulty].label;
      creditsStat.textContent = session.credits;
      raceStat.textContent = session.raceNumber;
    }

    function spawnDust(car) {
      particles.push({
        x: car.x + rand(-10, 10),
        y: car.y + rand(-10, 10),
        vx: rand(-1, 1),
        vy: rand(-1, 1),
        life: rand(14, 24),
        size: rand(4, 7)
      });
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 1;
        p.size *= 1.01;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function updateCamera() {
      if (!player) return;
      camera.x = lerp(camera.x, player.x, 0.10);
      camera.y = lerp(camera.y, player.y, 0.10);
      camera.zoom = lerp(camera.zoom, getBaseZoom(), 0.08);
    }

    function applyWorldTransform() {
      ctx.setTransform(
        camera.zoom,
        0,
        0,
        camera.zoom,
        W / 2 - camera.x * camera.zoom,
        H / 2 - camera.y * camera.zoom
      );
    }

    function drawBackground() {
      const t = track.map.theme;
      let gradient;
      if (t === 'sunset') {
        gradient = ctx.createLinearGradient(0, 0, 0, H);
        gradient.addColorStop(0, '#3b234a');
        gradient.addColorStop(0.4, '#57314a');
        gradient.addColorStop(1, '#234626');
      } else if (t === 'neon') {
        gradient = ctx.createLinearGradient(0, 0, W, H);
        gradient.addColorStop(0, '#0c1020');
        gradient.addColorStop(0.5, '#12192b');
        gradient.addColorStop(1, '#091018');
      } else if (t === 'desert') {
        gradient = ctx.createLinearGradient(0, 0, 0, H);
        gradient.addColorStop(0, '#5d3d23');
        gradient.addColorStop(0.45, '#74522c');
        gradient.addColorStop(1, '#7d6b31');
      } else {
        gradient = ctx.createLinearGradient(0, 0, 0, H);
        gradient.addColorStop(0, '#18321c');
        gradient.addColorStop(0.4, '#1b4720');
        gradient.addColorStop(1, '#0d2410');
      }
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);

      applyWorldTransform();
      drawScenery();
      drawTrack();
      drawParticles();
    }

    function drawScenery() {
      const s = track.map.scenery;
      const step = 8;
      for (let i = 0; i < track.samples.length; i += step) {
        const p = track.samples[i];
        const nx = -Math.sin(p.tangent);
        const ny = Math.cos(p.tangent);
        const offset = track.roadWidth * 0.95 + 160 + (i % 5) * 24;
        const x = p.x + nx * offset;
        const y = p.y + ny * offset;
        if (s === 'lights') {
          ctx.fillStyle = i % 16 < 8 ? 'rgba(114,215,255,0.24)' : 'rgba(255,93,188,0.24)';
          ctx.beginPath();
          ctx.arc(x, y, 16 + (i % 3) * 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (s === 'rocks') {
          ctx.fillStyle = 'rgba(65,41,21,0.34)';
          ctx.beginPath();
          ctx.arc(x, y, 18 + (i % 4) * 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (s === 'palms') {
          ctx.fillStyle = 'rgba(24,69,31,0.5)';
          ctx.beginPath();
          ctx.arc(x, y, 18, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = 'rgba(88,60,27,0.45)';
          ctx.fillRect(x - 3, y + 8, 6, 18);
        } else {
          ctx.fillStyle = 'rgba(13,47,16,0.5)';
          ctx.beginPath();
          ctx.arc(x, y, 18 + (i % 3) * 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawTrack() {
      ctx.save();
      ctx.beginPath();
      for (let i = 0; i < track.samples.length; i++) {
        const p = track.samples[i];
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.closePath();

      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = track.roadWidth + 18;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.stroke();

      ctx.strokeStyle = '#2f343b';
      ctx.lineWidth = track.roadWidth;
      ctx.stroke();

      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth = 7;
      ctx.setLineDash([70, 55]);
      ctx.stroke();
      ctx.setLineDash([]);

      const start = centerPoint(-Math.PI / 2);
      const tangent = tangentAngleOnTrack(-Math.PI / 2);
      const nx = -Math.sin(tangent);
      const ny = Math.cos(tangent);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 12;
      for (let i = -2; i <= 2; i++) {
        const o = i * 34;
        ctx.beginPath();
        ctx.moveTo(start.x + nx * o - Math.cos(tangent) * track.roadWidth * 0.5, start.y + ny * o - Math.sin(tangent) * track.roadWidth * 0.5);
        ctx.lineTo(start.x + nx * o + Math.cos(tangent) * track.roadWidth * 0.5, start.y + ny * o + Math.sin(tangent) * track.roadWidth * 0.5);
        ctx.stroke();
      }
      ctx.restore();
    }

    function roundRectPath(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life / 28);
        ctx.fillStyle = 'rgba(188,153,99,0.7)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawCar(car) {
      ctx.save();
      ctx.translate(car.x, car.y);
      ctx.rotate(car.angle + Math.PI / 2);
      ctx.shadowColor = 'rgba(0,0,0,0.34)';
      ctx.shadowBlur = 18;
      ctx.shadowOffsetY = 9;

      ctx.fillStyle = '#0f1115';
      roundRectPath(-car.w / 2, -car.h / 2, car.w, car.h, 8);
      ctx.fill();
      ctx.shadowColor = 'transparent';

      ctx.fillStyle = car.color;
      roundRectPath(-car.w / 2 + 2, -car.h / 2 + 2, car.w - 4, car.h - 4, 7);
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      roundRectPath(-car.w / 2 + 4, -car.h / 2 + 5, car.w - 8, 9, 4);
      ctx.fill();

      ctx.fillStyle = '#15181d';
      roundRectPath(-car.w / 2 - 2, -car.h / 2 + 4, 5, 11, 2); ctx.fill();
      roundRectPath(car.w / 2 - 3, -car.h / 2 + 4, 5, 11, 2); ctx.fill();
      roundRectPath(-car.w / 2 - 2, car.h / 2 - 15, 5, 11, 2); ctx.fill();
      roundRectPath(car.w / 2 - 3, car.h / 2 - 15, 5, 11, 2); ctx.fill();

      ctx.fillStyle = '#ffef9b';
      ctx.fillRect(-car.w / 2 + 3, -car.h / 2 + 1, 5, 3);
      ctx.fillRect(car.w / 2 - 8, -car.h / 2 + 1, 5, 3);

      ctx.fillStyle = '#ff6b6b';
      ctx.fillRect(-car.w / 2 + 3, car.h / 2 - 4, 5, 3);
      ctx.fillRect(car.w / 2 - 8, car.h / 2 - 4, 5, 3);

      if (!car.ai && (mouse.left || keys.up || keys.gas) && Math.abs(car.speed) > 0.2) {
        ctx.fillStyle = 'rgba(255, 194, 64, 0.72)';
        ctx.beginPath();
        ctx.moveTo(-4, car.h / 2 + 2);
        ctx.lineTo(0, car.h / 2 + 18 + Math.random() * 8);
        ctx.lineTo(4, car.h / 2 + 2);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function drawCursorGuide() {
      if (!mouse.active || overlay.style.display !== 'none') return;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.strokeStyle = 'rgba(255,255,255,0.16)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(mouse.x, mouse.y, 12, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mouse.x - 16, mouse.y);
      ctx.lineTo(mouse.x + 16, mouse.y);
      ctx.moveTo(mouse.x, mouse.y - 16);
      ctx.lineTo(mouse.x, mouse.y + 16);
      ctx.stroke();
    }

    function drawArrowToLeader() {
      if (!player || state.mode !== 'running') return;
      const ranking = [...cars].sort((a, b) => rankingValue(b) - rankingValue(a));
      if (ranking[0] === player) return;
      const leader = ranking[0];
      const dx = leader.x - player.x;
      const dy = leader.y - player.y;
      const ang = Math.atan2(dy, dx);
      const x = W - 88;
      const y = H - 90;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ang + Math.PI / 2);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath();
      ctx.moveTo(0, -24);
      ctx.lineTo(14, 16);
      ctx.lineTo(0, 8);
      ctx.lineTo(-14, 16);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawMiniMap() {
      if (!player) return;
      const w = 180;
      const h = 120;
      const x = W - w - 18;
      const y = 18;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = 'rgba(10,14,18,0.72)';
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      roundRectPath(x, y, w, h, 18);
      ctx.fill();
      ctx.stroke();

      const bounds = track.bounds;
      const scale = Math.min((w - 24) / (bounds.maxX - bounds.minX), (h - 24) / (bounds.maxY - bounds.minY));
      ctx.save();
      ctx.beginPath();
      roundRectPath(x, y, w, h, 18);
      ctx.clip();
      ctx.translate(x + 12, y + 12);
      ctx.scale(scale, scale);
      ctx.translate(-bounds.minX, -bounds.minY);

      ctx.beginPath();
      for (let i = 0; i < track.samples.length; i++) {
        const p = track.samples[i];
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.closePath();
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = track.roadWidth + 18;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.strokeStyle = '#2f343b';
      ctx.lineWidth = track.roadWidth;
      ctx.stroke();

      for (const rival of rivals) {
        ctx.fillStyle = rival.color;
        ctx.beginPath();
        ctx.arc(rival.x, rival.y, 24, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#4ad0ff';
      ctx.beginPath();
      ctx.arc(player.x, player.y, 26, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function updateCamera() {
      if (!player) return;
      camera.x = lerp(camera.x, player.x, 0.10);
      camera.y = lerp(camera.y, player.y, 0.10);
      camera.zoom = lerp(camera.zoom, getBaseZoom(), 0.08);
    }

    function applyWorldTransform() {
      ctx.setTransform(
        camera.zoom,
        0,
        0,
        camera.zoom,
        W / 2 - camera.x * camera.zoom,
        H / 2 - camera.y * camera.zoom
      );
    }

    function render() {
      updateCamera();
      drawBackground();
      applyWorldTransform();
      if (cars.length) {
        for (const car of cars) drawCar(car);
      }
      drawArrowToLeader();
      drawMiniMap();
      drawCursorGuide();
    }

    function buyUpgrade(id) {
      const def = upgradeDefs.find(u => u.id === id);
      const level = getUpgradeLevel(id);
      if (!def || level >= def.max) return;
      const cost = getUpgradeCost(id);
      if (session.credits < cost) return;
      session.credits -= cost;
      session.upgrades[id] += 1;
      updateHUD();
      renderShop();
    }

    function renderMenu() {
      state.mode = 'menu';
      overlay.style.display = 'flex';
      countdownEl.style.display = 'none';
      overlayCard.innerHTML = `
        <div class="eyebrow">Grand Prix Arcade</div>
        <h2>DRIFT CROWN GP</h2>
        <p>Ahora los circuitos tienen mucho más recorrido real y trazados más largos de verdad, no solo pistas ampliadas. La cámara sigue al coche para que la vuelta se sienta como un gran premio largo.</p>
        <p>La dificultad cambia la velocidad, la trazada y la presión de la IA. Cada nueva carrera usa un circuito grande distinto.</p>
        <div class="difficultyLabel">Elige dificultad</div>
        <div class="difficultyRow">
          <button class="diffBtn ${state.difficulty === 'easy' ? 'active' : ''}" data-difficulty="easy">Fácil</button>
          <button class="diffBtn ${state.difficulty === 'normal' ? 'active' : ''}" data-difficulty="normal">Normal</button>
          <button class="diffBtn ${state.difficulty === 'hard' ? 'active' : ''}" data-difficulty="hard">Difícil</button>
        </div>
        <div class="tagRow">
          <div class="tag">Circuito: ${track.map.name}</div>
          <div class="tag gold">Puntos: ${session.credits}</div>
          <div class="tag">Carrera ${session.raceNumber}</div>
        </div>
        <div class="mobileHint">En móvil usa los botones táctiles: izquierda para girar y derecha para acelerar o frenar.</div>
        <div class="btnRow">
          <button class="primary" id="startRaceBtn">Empezar carrera</button>
          <button id="changeMapBtn">Otro circuito</button>
        </div>
      `;

      overlayCard.querySelectorAll('[data-difficulty]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.difficulty = btn.dataset.difficulty;
          resetCars();
          updateHUD();
          renderMenu();
        });
      });
      overlayCard.querySelector('#startRaceBtn').addEventListener('click', startRace);
      overlayCard.querySelector('#changeMapBtn').addEventListener('click', () => {
        chooseRandomMap();
        resetCars();
        renderMenu();
      });
    }

    function renderShop() {
      const result = state.result;
      overlay.style.display = 'flex';
      const itemsHtml = upgradeDefs.map(def => {
        const level = getUpgradeLevel(def.id);
        const maxed = level >= def.max;
        const nextCost = maxed ? 'MAX' : getUpgradeCost(def.id);
        const canBuy = !maxed && session.credits >= getUpgradeCost(def.id);
        const dots = Array.from({ length: def.max }, (_, i) => `<div class="levelDot ${i < level ? 'on' : ''}"></div>`).join('');
        return `
          <div class="shopItem">
            <div class="shopItemTop">
              <div>
                <h3>${def.title}</h3>
                <small>Nivel ${level} / ${def.max}</small>
              </div>
              <small>${maxed ? 'Mejora completa' : 'Siguiente: ' + nextCost + ' pts'}</small>
            </div>
            <p>${def.desc}</p>
            <div class="levelBar">${dots}</div>
            <div class="costLine">
              <span>${maxed ? 'Máximo alcanzado' : 'Coste: ' + nextCost + ' pts'}</span>
              <button class="${canBuy ? 'primary' : ''}" data-upgrade="${def.id}" ${canBuy ? '' : 'disabled'}>${maxed ? 'MAX' : 'Comprar'}</button>
            </div>
          </div>
        `;
      }).join('');

      overlayCard.innerHTML = `
        <div class="eyebrow">Tienda</div>
        <h2>${result.position === 1 ? '¡Victoria!' : 'Carrera terminada'}</h2>
        <p>Has terminado en <strong>${track.map.name}</strong>. Gasta tus puntos en mejoras antes del siguiente gran premio.</p>
        <div class="raceSummary">
          <div class="summaryBox"><span>Posición</span><strong>${result.position} / 4</strong></div>
          <div class="summaryBox"><span>Tiempo</span><strong>${formatTime(result.time)}</strong></div>
          <div class="summaryBox"><span>Ganados</span><strong>+${result.earned}</strong></div>
          <div class="summaryBox"><span>Total</span><strong>${session.credits}</strong></div>
        </div>
        <div class="shopGrid">${itemsHtml}</div>
        <div class="btnRow">
          <button class="primary" id="nextRaceBtn">Siguiente gran premio</button>
          <button id="menuBtn">Volver al menú</button>
        </div>
      `;

      overlayCard.querySelectorAll('[data-upgrade]').forEach(btn => {
        btn.addEventListener('click', () => buyUpgrade(btn.dataset.upgrade));
      });
      overlayCard.querySelector('#nextRaceBtn').addEventListener('click', () => {
        session.raceNumber += 1;
        chooseRandomMap();
        resetCars();
        startRace();
      });
      overlayCard.querySelector('#menuBtn').addEventListener('click', () => {
        chooseRandomMap();
        resetCars();
        renderMenu();
      });
    }

    async function startRace() {
      raceToken += 1;
      const token = raceToken;
      resetCars();
      overlay.style.display = 'none';
      state.mode = 'countdown';
      updateHUD();
      countdownEl.style.display = 'flex';

      const seq = ['3', '2', '1', 'GO!'];
      for (const item of seq) {
        if (token !== raceToken) return;
        countdownEl.textContent = item;
        await new Promise(resolve => setTimeout(resolve, item === 'GO!' ? 450 : 650));
      }

      if (token !== raceToken) return;
      countdownEl.style.display = 'none';
      state.mode = 'running';
      startTime = performance.now();
      elapsed = 0;
      updateHUD();
    }

    function finishRace() {
      const pos = rankingPosition();
      const earned = computeReward(pos);
      session.credits += earned;
      state.result = { position: pos, earned, time: elapsed };
      state.mode = 'shop';
      updateHUD();
      renderShop();
    }

    function loop(ts) {
      if (state.mode === 'running') {
        elapsed = ts - startTime;
        movePlayer(player);
        for (const rival of rivals) moveAI(rival);
        for (const car of cars) updateCarPhysics(car);
        updateHUD();
      }
      updateParticles();
      render();
      requestAnimationFrame(loop);
    }

    function setKeyFromCode(code, pressed) {
      if (code === 'ArrowUp' || code === 'KeyW') keys.up = pressed;
      if (code === 'ArrowDown' || code === 'KeyS') keys.down = pressed;
      if (code === 'ArrowLeft' || code === 'KeyA') keys.left = pressed;
      if (code === 'ArrowRight' || code === 'KeyD') keys.right = pressed;
      if (code === 'Space') keys.gas = pressed;
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyR') {
        if (state.mode === 'running' || state.mode === 'countdown') startRace();
        return;
      }
      setKeyFromCode(e.code, true);
    });
    window.addEventListener('keyup', (e) => setKeyFromCode(e.code, false));

    canvas.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
    });
    canvas.addEventListener('mousedown', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
      if (e.button === 0) mouse.left = true;
      if (e.button === 2) mouse.right = true;
    });
    window.addEventListener('mouseup', (e) => {
      if (e.button === 0) mouse.left = false;
      if (e.button === 2) mouse.right = false;
    });
    canvas.addEventListener('mouseleave', () => {
      mouse.left = false;
      mouse.right = false;
    });
    canvas.addEventListener('touchstart', () => {
      mouse.active = false;
    }, { passive: true });
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    function bindTouchButton(el, key) {
      const on = (ev) => {
        ev.preventDefault();
        keys[key] = true;
        el.classList.add('active');
      };
      const off = (ev) => {
        ev.preventDefault();
        keys[key] = false;
        el.classList.remove('active');
      };
      el.addEventListener('pointerdown', on);
      el.addEventListener('pointerup', off);
      el.addEventListener('pointercancel', off);
      el.addEventListener('pointerleave', off);
    }

    document.querySelectorAll('.touchBtn[data-key]').forEach(btn => bindTouchButton(btn, btn.dataset.key));
    window.addEventListener('resize', resize);

    buildTrack();
    resetCars();
    updateHUD();
    renderMenu();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
