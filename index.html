<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Drift Crown</title>
  <style>
    :root {
      --panel: rgba(10, 14, 18, 0.82);
      --line: rgba(255,255,255,0.09);
      --text: #f5f7fa;
      --muted: #aeb8c4;
      --accent: #ffd54a;
      --accent2: #72d7ff;
      --shadow: rgba(0,0,0,0.38);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--text);
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1a2230 0%, #0b1016 55%, #05070a 100%);
      touch-action: none;
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }
    .hud {
      position: fixed;
      inset: 14px 14px auto 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      z-index: 20;
      pointer-events: none;
    }
    .leftCol, .rightCol {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .panel {
      min-width: 190px;
      padding: 12px 14px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 28px var(--shadow);
    }
    .panel h1 {
      margin: 0 0 8px;
      font-size: 14px;
      letter-spacing: 0.14em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .stat {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      font-size: 14px;
      margin: 5px 0;
    }
    .stat span:last-child { font-weight: 800; }
    .help {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-align: right;
      min-width: 250px;
    }
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      background: rgba(5, 7, 10, 0.62);
      backdrop-filter: blur(7px);
    }
    .card {
      width: min(96vw, 900px);
      max-height: 92vh;
      overflow: auto;
      padding: 28px;
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(17,23,30,0.96), rgba(9,13,17,0.97));
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 32px 90px rgba(0,0,0,0.48);
      text-align: center;
    }
    .eyebrow {
      color: var(--accent2);
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 800;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: clamp(34px, 6vw, 56px);
      line-height: 0.95;
    }
    .card p {
      margin: 10px auto;
      max-width: 680px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    .difficultyLabel {
      margin-top: 18px;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 800;
    }
    .difficultyRow, .btnRow {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .diffBtn, button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      color: var(--text);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.09);
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }
    .diffBtn:hover, button:hover { transform: translateY(-1px); }
    .diffBtn.active, button.primary {
      background: linear-gradient(180deg, #ffe580, #ffcb2e);
      color: #1a1607;
      border-color: transparent;
      box-shadow: 0 10px 24px rgba(255, 203, 46, 0.3);
    }
    button[disabled] {
      opacity: 0.48;
      cursor: default;
      transform: none !important;
    }
    .tag {
      margin-top: 14px;
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(114,215,255,0.12);
      border: 1px solid rgba(114,215,255,0.26);
      color: #c7f0ff;
      font-size: 13px;
      font-weight: 700;
    }
    .tag.gold {
      background: rgba(255,213,74,0.12);
      border-color: rgba(255,213,74,0.28);
      color: #ffe69a;
    }
    .tagRow {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 14px 0 8px;
    }
    .countdown {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 28;
      pointer-events: none;
      font-size: clamp(80px, 18vw, 160px);
      font-weight: 900;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 14px 40px rgba(0,0,0,0.45);
    }
    .mobileControls {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 24;
      display: none;
      justify-content: space-between;
      align-items: end;
      padding: 0 max(14px, env(safe-area-inset-left)) 0 max(14px, env(safe-area-inset-right));
      pointer-events: none;
    }
    .controlCluster {
      display: grid;
      grid-template-columns: repeat(3, 72px);
      grid-template-rows: repeat(2, 72px);
      gap: 10px;
      pointer-events: auto;
    }
    .touchBtn {
      border-radius: 20px;
      background: rgba(10,14,18,0.82);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      font-size: 26px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      box-shadow: 0 12px 24px rgba(0,0,0,0.28);
    }
    .touchBtn.active {
      background: rgba(255, 213, 74, 0.2);
      border-color: rgba(255, 213, 74, 0.5);
      transform: scale(0.97);
    }
    .blank { visibility: hidden; }
    .mobileHint {
      display: none;
      margin-top: 10px;
      font-size: 13px;
      color: #cfe8ff;
      opacity: 0.92;
    }
    .shopGrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
      text-align: left;
    }
    .shopItem {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
    }
    .shopItemTop {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 8px;
    }
    .shopItem h3 {
      margin: 0;
      font-size: 18px;
    }
    .shopItem small {
      color: var(--muted);
      font-size: 12px;
    }
    .shopItem p {
      margin: 8px 0 12px;
      font-size: 14px;
      max-width: none;
    }
    .levelBar {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }
    .levelDot {
      height: 8px;
      flex: 1;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
    }
    .levelDot.on {
      background: linear-gradient(90deg, #72d7ff, #ffd54a);
    }
    .costLine {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .raceSummary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }
    .summaryBox {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 12px;
    }
    .summaryBox strong {
      display: block;
      font-size: 21px;
      margin-top: 4px;
      color: var(--text);
    }
    .summaryBox span {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    @media (max-width: 920px), (pointer: coarse) {
      .hud {
        inset: max(10px, env(safe-area-inset-top)) 10px auto 10px;
        gap: 8px;
      }
      .leftCol, .rightCol {
        flex-direction: column;
        gap: 8px;
      }
      .panel {
        min-width: 0;
        padding: 10px 12px;
      }
      .help {
        min-width: 0;
        font-size: 12px;
      }
      .card {
        padding: 22px 18px;
        border-radius: 24px;
      }
      .mobileControls {
        display: flex;
      }
      .mobileHint {
        display: block;
      }
      .shopGrid {
        grid-template-columns: 1fr;
      }
      .raceSummary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 560px), (pointer: coarse) {
      .hud {
        inset: max(8px, env(safe-area-inset-top)) 8px auto 8px;
      }
      .panel {
        padding: 8px 10px;
      }
      .panel h1 {
        font-size: 12px;
      }
      .stat {
        font-size: 12px;
      }
      .controlCluster {
        grid-template-columns: repeat(3, 78px);
        grid-template-rows: repeat(2, 78px);
      }
      .touchBtn {
        font-size: 28px;
      }
      .raceSummary {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="leftCol">
      <div class="panel">
        <h1>Carrera</h1>
        <div class="stat"><span>Velocidad</span><span id="speedStat">0 km/h</span></div>
        <div class="stat"><span>Vuelta</span><span id="lapStat">0 / 3</span></div>
        <div class="stat"><span>Posición</span><span id="posStat">4 / 4</span></div>
        <div class="stat"><span>Tiempo</span><span id="timeStat">00:00.0</span></div>
      </div>
      <div class="panel">
        <h1>Progreso</h1>
        <div class="stat"><span>Mapa</span><span id="mapStat">—</span></div>
        <div class="stat"><span>Dificultad</span><span id="diffStat">Normal</span></div>
        <div class="stat"><span>Puntos</span><span id="creditsStat">0</span></div>
        <div class="stat"><span>Carrera</span><span id="raceStat">1</span></div>
      </div>
    </div>
    <div class="rightCol">
      <div class="panel help">
        <div><strong>Ordenador</strong>: ratón para dirigir</div>
        <div><strong>Clic izq</strong>: acelerar · <strong>Clic der</strong>: frenar</div>
        <div><strong>Móvil</strong>: botones táctiles para girar, acelerar y frenar</div>
        <div><strong>R</strong>: reiniciar carrera actual</div>
      </div>
    </div>
  </div>

  <div class="countdown" id="countdown">3</div>

  <div class="mobileControls" aria-hidden="true">
    <div class="controlCluster">
      <div class="touchBtn blank"></div>
      <div class="touchBtn" data-key="up">▲</div>
      <div class="touchBtn blank"></div>
      <div class="touchBtn" data-key="left">◀</div>
      <div class="touchBtn" data-key="down">▼</div>
      <div class="touchBtn" data-key="right">▶</div>
    </div>
    <div class="controlCluster" style="grid-template-columns: repeat(2, 88px); grid-template-rows: repeat(1, 88px);">
      <div class="touchBtn" data-key="brake">BRAKE</div>
      <div class="touchBtn" data-key="gas">GAS</div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="card" id="overlayCard"></div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const speedStat = document.getElementById('speedStat');
    const lapStat = document.getElementById('lapStat');
    const posStat = document.getElementById('posStat');
    const timeStat = document.getElementById('timeStat');
    const mapStat = document.getElementById('mapStat');
    const diffStat = document.getElementById('diffStat');
    const creditsStat = document.getElementById('creditsStat');
    const raceStat = document.getElementById('raceStat');
    const overlay = document.getElementById('overlay');
    const overlayCard = document.getElementById('overlayCard');
    const countdownEl = document.getElementById('countdown');

    let W = canvas.width = window.innerWidth;
    let H = canvas.height = window.innerHeight;
    let startTime = 0;
    let elapsed = 0;
    let raceToken = 0;

    const keys = { up: false, down: false, left: false, right: false, gas: false, brake: false };
    const mouse = { x: W * 0.5, y: H * 0.5, left: false, right: false, active: true };

    const difficultySettings = {
      easy:   { label: 'Fácil', aiSpeed: 0.94, aiAccel: 0.96, aiTurn: 0.96, aiLookAhead: 0.12, aiPush: 0.84, reward: 0.9 },
      normal: { label: 'Normal', aiSpeed: 1.14, aiAccel: 1.10, aiTurn: 1.12, aiLookAhead: 0.16, aiPush: 0.97, reward: 1.2 },
      hard:   { label: 'Difícil', aiSpeed: 1.42, aiAccel: 1.30, aiTurn: 1.30, aiLookAhead: 0.22, aiPush: 1.12, reward: 1.6 }
    };

    const maps = [
      {

        points:[[-1.04,-0.02],[-0.92,-0.46],[-0.78,-0.82],[-0.42,-0.98],[-0.04,-0.90],[0.22,-0.72],[0.52,-0.82],[0.84,-0.66],[1.00,-0.28],[0.98,0.08],[0.82,0.38],[0.56,0.62],[0.22,0.78],[-0.10,0.86],[-0.44,0.82],[-0.76,0.62],[-0.96,0.28]]
      },
      {
        name:'Neon Esses', theme:'neon', roadWidth:98, scale:1.08, scenery:'lights',
        points:[[-1.02,-0.04],[-0.92,-0.34],[-0.78,-0.66],[-0.50,-0.84],[-0.18,-0.76],[0.06,-0.58],[0.30,-0.78],[0.58,-0.84],[0.84,-0.64],[0.98,-0.28],[0.96,0.04],[0.82,0.30],[0.56,0.50],[0.22,0.60],[-0.06,0.72],[-0.36,0.82],[-0.70,0.70],[-0.94,0.34]]
      },
      {
        name:'Emerald Link', theme:'forest', roadWidth:104, scale:1.12, scenery:'trees',
        points:[[-1.04,-0.06],[-0.96,-0.42],[-0.86,-0.78],[-0.54,-0.96],[-0.18,-0.92],[0.12,-0.74],[0.36,-0.86],[0.66,-0.86],[0.90,-0.58],[1.00,-0.18],[0.94,0.18],[0.76,0.46],[0.48,0.66],[0.16,0.82],[-0.18,0.90],[-0.52,0.84],[-0.82,0.60],[-0.98,0.24]]
      },
      {
        name:'Desert Apex', theme:'desert', roadWidth:106, scale:1.14, scenery:'rocks',
        points:[[-1.06,-0.04],[-0.96,-0.42],[-0.88,-0.84],[-0.56,-1.00],[-0.14,-0.94],[0.18,-0.84],[0.46,-0.92],[0.78,-0.76],[0.98,-0.42],[1.02,-0.02],[0.94,0.30],[0.72,0.56],[0.42,0.74],[0.08,0.86],[-0.28,0.92],[-0.62,0.82],[-0.90,0.54],[-1.04,0.18]]
      },
      {
        name:'Blue Ribbon', theme:'neon', roadWidth:98, scale:1.08, scenery:'lights',
        points:[[-1.04,-0.08],[-0.94,-0.38],[-0.80,-0.70],[-0.52,-0.88],[-0.20,-0.84],[0.04,-0.70],[0.26,-0.80],[0.54,-0.78],[0.82,-0.56],[1.00,-0.22],[1.00,0.12],[0.84,0.38],[0.56,0.56],[0.26,0.66],[-0.04,0.78],[-0.36,0.88],[-0.70,0.76],[-0.96,0.40]]
      },
      {
        name:'Palm Corner', theme:'sunset', roadWidth:104, scale:1.12, scenery:'palms',
        points:[[-1.04,-0.06],[-0.96,-0.40],[-0.86,-0.80],[-0.54,-0.94],[-0.18,-0.90],[0.14,-0.82],[0.42,-0.88],[0.74,-0.76],[0.96,-0.46],[1.00,-0.10],[0.94,0.22],[0.80,0.48],[0.56,0.68],[0.26,0.82],[-0.08,0.88],[-0.44,0.84],[-0.76,0.66],[-0.98,0.30]]
      },
      {
        name:'Jungle Arc', theme:'forest', roadWidth:104, scale:1.10, scenery:'trees',
        points:[[-1.02,-0.06],[-0.92,-0.36],[-0.82,-0.72],[-0.56,-0.90],[-0.24,-0.88],[0.04,-0.82],[0.28,-0.92],[0.58,-0.84],[0.84,-0.62],[0.98,-0.26],[0.98,0.08],[0.86,0.38],[0.64,0.60],[0.36,0.74],[0.04,0.84],[-0.30,0.88],[-0.64,0.74],[-0.90,0.44]]
      },
      {
        name:'Rocky Sweep', theme:'desert', roadWidth:108, scale:1.16, scenery:'rocks',
        points:[[-1.06,-0.08],[-0.98,-0.40],[-0.90,-0.82],[-0.62,-0.98],[-0.24,-0.96],[0.10,-0.90],[0.40,-0.96],[0.72,-0.84],[0.96,-0.56],[1.04,-0.18],[1.00,0.18],[0.86,0.48],[0.60,0.68],[0.26,0.82],[-0.10,0.92],[-0.46,0.88],[-0.78,0.68],[-1.00,0.30]]
      }
    ];

    const upgradeDefs = [
      { id: 'engine', title: 'Motor', desc: '+ aceleración y un poco de salida', baseCost: 55, max: 6 },
      { id: 'handling', title: 'Dirección', desc: '+ giro y respuesta del coche', baseCost: 50, max: 6 },
      { id: 'topSpeed', title: 'Turbo', desc: '+ velocidad máxima', baseCost: 70, max: 6 },
      { id: 'recovery', title: 'Suspensión', desc: '+ menos castigo al salirte del asfalto', baseCost: 60, max: 6 }
    ];

    const state = {
      mode: 'menu',
      difficulty: 'normal',
      currentMapIndex: Math.floor(Math.random() * maps.length),
      result: null
    };

    const session = {
      credits: 0,
      raceNumber: 1,
      upgrades: { engine: 0, handling: 0, topSpeed: 0, recovery: 0 }
    };

    const track = {
      cx: 0,
      cy: 0,
      roadWidth: 86,
      baseScale: 1,
      samples: [],
      controlPoints: [],
      map: maps[state.currentMapIndex]
    };

    const particles = [];
    let player = null;
    let rivals = [];
    let cars = [];

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function rand(min, max) { return min + Math.random() * (max - min); }

    function chooseRandomMap() {
      let next = state.currentMapIndex;
      while (maps.length > 1 && next === state.currentMapIndex) {
        next = Math.floor(Math.random() * maps.length);
      }
      state.currentMapIndex = next;
      track.map = maps[next];
      buildTrack();
      updateHUD();
    }

    function catmullRom(p0, p1, p2, p3, t) {
      const tension = 0.16;
      const t2 = t * t;
      const t3 = t2 * t;

      const m1x = (p2.x - p0.x) * tension;
      const m1y = (p2.y - p0.y) * tension;
      const m2x = (p3.x - p1.x) * tension;
      const m2y = (p3.y - p1.y) * tension;

      return {
        x: (2 * t3 - 3 * t2 + 1) * p1.x + (t3 - 2 * t2 + t) * m1x + (-2 * t3 + 3 * t2) * p2.x + (t3 - t2) * m2x,
        y: (2 * t3 - 3 * t2 + 1) * p1.y + (t3 - 2 * t2 + t) * m1y + (-2 * t3 + 3 * t2) * p2.y + (t3 - t2) * m2y
      };
    }

    function smoothClosedPoints(points, iterations = 2) {
      let pts = points.map(p => ({ x: p.x, y: p.y }));
      for (let k = 0; k < iterations; k++) {
        const next = [];
        const n = pts.length;
        for (let i = 0; i < n; i++) {
          const a = pts[i];
          const b = pts[(i + 1) % n];
          next.push({ x: a.x * 0.75 + b.x * 0.25, y: a.y * 0.75 + b.y * 0.25 });
          next.push({ x: a.x * 0.25 + b.x * 0.75, y: a.y * 0.25 + b.y * 0.75 });
        }
        pts = next;
      }
      return pts;
    }

    function centerPoint(angle) {
      const pts = track.controlPoints;
      const n = pts.length;
      if (!n) return { x: track.cx, y: track.cy };
      const u = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      const f = (u / (Math.PI * 2)) * n;
      const i = Math.floor(f) % n;
      const t = f - Math.floor(f);
      const p0 = pts[(i - 1 + n) % n];
      const p1 = pts[i % n];
      const p2 = pts[(i + 1) % n];
      const p3 = pts[(i + 2) % n];
      return catmullRom(p0, p1, p2, p3, t);
    }

    function tangentAngleOnTrack(angle) {
      const d = 0.006;
      const p1 = centerPoint(angle - d);
      const p2 = centerPoint(angle + d);
      return Math.atan2(p2.y - p1.y, p2.x - p1.x);
    }

    function sampleTrack() {
      track.samples = [];
      const total = 420;
      for (let i = 0; i <= total; i++) {
        const angle = (i / total) * Math.PI * 2;
        const p = centerPoint(angle);
        track.samples.push({ angle, x: p.x, y: p.y, tangent: tangentAngleOnTrack(angle) });
      }
    }

    function buildTrack() {
      track.map = maps[state.currentMapIndex];
      track.cx = W / 2;
      track.cy = H / 2 + Math.min(18, H * 0.02);
      track.roadWidth = track.map.roadWidth;
      track.baseScale = Math.min(W, H) * 0.31 * track.map.scale;
      const rawPoints = track.map.points.map(([x, y]) => ({
        x: track.cx + x * track.baseScale,
        y: track.cy + y * track.baseScale
      }));
      track.controlPoints = smoothClosedPoints(rawPoints, 2);
      sampleTrack();
    }

    function angleToProgress(angle) {
      let p = angle + Math.PI / 2;
      while (p < 0) p += Math.PI * 2;
      while (p >= Math.PI * 2) p -= Math.PI * 2;
      return p / (Math.PI * 2);
    }

    function normalizeAngle(a) {
      while (a > Math.PI) a -= Math.PI * 2;
      while (a < -Math.PI) a += Math.PI * 2;
      return a;
    }

    function pointOnMid(angle, laneOffset = 0) {
      const p = centerPoint(angle);
      const tangent = tangentAngleOnTrack(angle);
      const nx = -Math.sin(tangent);
      const ny = Math.cos(tangent);
      return {
        x: p.x + nx * laneOffset,
        y: p.y + ny * laneOffset
      };
    }

    function tangentAngleOnEllipse(angle) {
      return tangentAngleOnTrack(angle);
    }

    function getClosestTrackPoint(x, y) {
      let best = track.samples[0];
      let bestD = Infinity;
      for (let i = 0; i < track.samples.length; i++) {
        const s = track.samples[i];
        const dx = x - s.x;
        const dy = y - s.y;
        const d = dx * dx + dy * dy;
        if (d < bestD) {
          bestD = d;
          best = s;
        }
      }
      return { sample: best, dist: Math.sqrt(bestD) };
    }

    function getUpgradeLevel(id) {
      return session.upgrades[id] || 0;
    }

    function getUpgradeCost(id) {
      const def = upgradeDefs.find(u => u.id === id);
      const level = getUpgradeLevel(id);
      return Math.round(def.baseCost * (1 + level * 0.55));
    }

    function createCar({ angle, laneOffset, color, ai = false, skill = 1 }) {
      const p = pointOnMid(angle, laneOffset);
      const diff = difficultySettings[state.difficulty];
      const heading = tangentAngleOnEllipse(angle);
      const engineLv = getUpgradeLevel('engine');
      const handlingLv = getUpgradeLevel('handling');
      const topSpeedLv = getUpgradeLevel('topSpeed');
      const recoveryLv = getUpgradeLevel('recovery');

      return {
        x: p.x,
        y: p.y,
        w: 20,
        h: 34,
        angle: heading,
        steer: 0,
        speed: 0,
        maxSpeed: ai ? (4.15 + skill * 0.32) * diff.aiSpeed : 4.82 + topSpeedLv * 0.22,
        accel: ai ? (0.086 + skill * 0.007) * diff.aiAccel : 0.105 + engineLv * 0.010,
        brake: ai ? 0.085 : 0.13 + recoveryLv * 0.005,
        turnRate: ai ? 0.029 * diff.aiTurn : 0.033 + handlingLv * 0.003,
        drag: ai ? 0.987 : Math.min(0.991, 0.986 + topSpeedLv * 0.001),
        offDrag: ai ? 0.88 : Math.min(0.95, 0.84 + recoveryLv * 0.015),
        color,
        ai,
        skill,
        laps: 0,
        progress: angleToProgress(angle),
        lastProgress: angleToProgress(angle)
      };
    }

    function resetCars() {
      player = createCar({ angle: -Math.PI / 2 + 0.03, laneOffset: -18, color: '#4ad0ff', ai: false });
      rivals = [
        createCar({ angle: -Math.PI / 2 - 0.08, laneOffset: 8, color: '#ff6b6b', ai: true, skill: 1.00 }),
        createCar({ angle: -Math.PI / 2 - 0.16, laneOffset: -34, color: '#9bff6f', ai: true, skill: 1.12 }),
        createCar({ angle: -Math.PI / 2 - 0.24, laneOffset: 28, color: '#ffd54a', ai: true, skill: 1.22 })
      ];
      cars = [player, ...rivals];
      particles.length = 0;
      elapsed = 0;
      updateHUD();
    }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      buildTrack();
      resetCars();
    }

    function trackFieldValue(x, y) {
      const closest = getClosestTrackPoint(x, y);
      return {
        onRoad: closest.dist <= track.roadWidth * 0.5,
        dist: closest.dist,
        sample: closest.sample
      };
    }

    function nearestAngleOnTrack(x, y) {
      return getClosestTrackPoint(x, y).sample.angle;
    }

    function movePlayer(car) {
      const accelerating = keys.up || keys.gas || mouse.left;
      const braking = keys.down || keys.brake || mouse.right;
      let steerInput = 0;
      const usingTouchSteering = keys.left || keys.right;

      if (mouse.active && !usingTouchSteering) {
        const desiredAngle = Math.atan2(mouse.y - car.y, mouse.x - car.x);
        const diff = normalizeAngle(desiredAngle - car.angle);
        steerInput = clamp(diff / 0.9, -1, 1);
      }

      if (keys.left) steerInput -= 1;
      if (keys.right) steerInput += 1;
      steerInput = clamp(steerInput, -1, 1);

      const speedFactor = clamp(Math.abs(car.speed) / 2.4, 0.18, 1);
      car.steer = lerp(car.steer, steerInput, usingTouchSteering ? 0.26 : 0.18);
      car.angle += car.steer * car.turnRate * speedFactor;

      if (accelerating) car.speed += car.accel;
      if (braking) car.speed -= car.brake;
      if (!accelerating && !braking) car.speed *= 0.985;
      car.speed = clamp(car.speed, -1.0, car.maxSpeed);
    }

    function moveAI(car) {
      const diffCfg = difficultySettings[state.difficulty];
      const targetAngle = nearestAngleOnTrack(car.x, car.y);
      const lookAhead = diffCfg.aiLookAhead + car.skill * 0.018;
      const targetPoint = pointOnMid(targetAngle + lookAhead, 0);
      const desired = Math.atan2(targetPoint.y - car.y, targetPoint.x - car.x);
      const diff = normalizeAngle(desired - car.angle);
      const steerDivisor = state.difficulty === 'hard' ? 0.52 : state.difficulty === 'normal' ? 0.64 : 0.78;
      const steerInput = clamp(diff / steerDivisor, -1, 1);

      car.steer = lerp(car.steer, steerInput, state.difficulty === 'hard' ? 0.26 : state.difficulty === 'normal' ? 0.20 : 0.15);
      const speedFactor = clamp(Math.abs(car.speed) / 2.1, 0.22, 1);
      car.angle += car.steer * car.turnRate * speedFactor;

      const road = trackFieldValue(car.x, car.y);
      const difficultyBonus = state.difficulty === 'hard' ? 0.05 : state.difficulty === 'normal' ? 0.025 : 0;
      const basePush = diffCfg.aiPush + difficultyBonus + Math.sin(performance.now() * 0.0012 + car.skill) * 0.012;
      const targetSpeed = road.onRoad
        ? car.maxSpeed * clamp(basePush, 0.72, state.difficulty === 'hard' ? 1.16 : state.difficulty === 'normal' ? 1.08 : 0.96)
        : car.maxSpeed * 0.36;

      if (car.speed < targetSpeed) car.speed += car.accel;
      else car.speed *= 0.992;
      car.speed = clamp(car.speed, 0, car.maxSpeed);
    }

    function updateCarPhysics(car) {
      const road = trackFieldValue(car.x, car.y);
      car.x += Math.cos(car.angle) * car.speed;
      car.y += Math.sin(car.angle) * car.speed;
      car.speed *= road.onRoad ? car.drag : car.offDrag;

      if (!road.onRoad && Math.random() < 0.24) {
        spawnDust(car);
      }

      constrainCarToTrack(car);
      updateProgress(car);
    }

    function constrainCarToTrack(car) {
      const road = trackFieldValue(car.x, car.y);
      if (road.onRoad) return;
      const p = road.sample;
      const pull = clamp((road.dist - track.roadWidth * 0.45) / 60, 0.10, 0.24);
      car.x = lerp(car.x, p.x, pull);
      car.y = lerp(car.y, p.y, pull);
    }

    function updateProgress(car) {
      const angle = nearestAngleOnTrack(car.x, car.y);
      const prog = angleToProgress(angle);

      if (car.lastProgress > 0.85 && prog < 0.15) {
        car.laps += 1;
        if (car === player && car.laps >= 3 && state.mode === 'running') {
          finishRace();
        }
      }

      if (car.lastProgress < 0.15 && prog > 0.85 && car.laps > 0) {
        car.laps -= 1;
      }

      car.lastProgress = prog;
      car.progress = prog;
    }

    function rankingValue(car) {
      return car.laps + car.progress;
    }

    function rankingPosition() {
      const ranking = [...cars].sort((a, b) => rankingValue(b) - rankingValue(a));
      return ranking.indexOf(player) + 1;
    }

    function computeReward(position) {
      const baseByPosition = [100, 65, 40, 20];
      const placement = baseByPosition[position - 1] || 15;
      const diffMult = difficultySettings[state.difficulty].reward;
      const raceBonus = Math.min(60, (session.raceNumber - 1) * 4);
      return Math.round((placement + raceBonus) * diffMult);
    }

    function formatTime(ms) {
      const totalSeconds = ms / 1000;
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = Math.floor(totalSeconds % 60);
      const tenths = Math.floor((totalSeconds % 1) * 10);
      return String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0') + '.' + tenths;
    }

    function updateHUD() {
      if (!player) return;
      speedStat.textContent = Math.round(Math.abs(player.speed) * 74) + ' km/h';
      lapStat.textContent = Math.min(player.laps, 3) + ' / 3';
      const ranking = [...cars].sort((a, b) => rankingValue(b) - rankingValue(a));
      posStat.textContent = (ranking.indexOf(player) + 1) + ' / ' + cars.length;
      timeStat.textContent = formatTime(elapsed);
      mapStat.textContent = track.map.name;
      diffStat.textContent = difficultySettings[state.difficulty].label;
      creditsStat.textContent = session.credits;
      raceStat.textContent = session.raceNumber;
    }

    function spawnDust(car) {
      particles.push({
        x: car.x + rand(-7, 7),
        y: car.y + rand(-7, 7),
        vx: rand(-0.8, 0.8),
        vy: rand(-0.8, 0.8),
        life: rand(12, 20),
        size: rand(3, 6)
      });
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 1;
        p.size *= 1.01;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function spawnImpact(x, y) {
      for (let i = 0; i < 6; i++) {
        particles.push({
          x,
          y,
          vx: rand(-1.2, 1.2),
          vy: rand(-1.2, 1.2),
          life: rand(8, 14),
          size: rand(2, 4)
        });
      }
    }

    function resolveCarCollisions() {
      const radius = 18;
      for (let i = 0; i < cars.length; i++) {
        for (let j = i + 1; j < cars.length; j++) {
          const a = cars[i];
          const b = cars[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.hypot(dx, dy) || 0.0001;
          const minDist = radius * 2;
          if (dist >= minDist) continue;

          const nx = dx / dist;
          const ny = dy / dist;
          const overlap = minDist - dist;

          a.x -= nx * overlap * 0.55;
          a.y -= ny * overlap * 0.55;
          b.x += nx * overlap * 0.55;
          b.y += ny * overlap * 0.55;

          const relVx = Math.cos(b.angle) * b.speed - Math.cos(a.angle) * a.speed;
          const relVy = Math.sin(b.angle) * b.speed - Math.sin(a.angle) * a.speed;
          const relAlongNormal = relVx * nx + relVy * ny;
          const impulse = Math.max(0.18, relAlongNormal * 0.35 + 0.22);

          a.speed = Math.max(-0.6, a.speed - impulse * 0.35);
          b.speed = Math.max(-0.2, b.speed - impulse * 0.35);

          a.angle -= impulse * 0.05 * (ny >= 0 ? 1 : -1);
          b.angle += impulse * 0.05 * (ny >= 0 ? 1 : -1);

          spawnImpact((a.x + b.x) * 0.5, (a.y + b.y) * 0.5);
        }
      }
    }

    function drawBackground() {
      const t = track.map.theme;
      let gradient;
      if (t === 'sunset') {
        gradient = ctx.createLinearGradient(0, 0, 0, H);
        gradient.addColorStop(0, '#3b234a');
        gradient.addColorStop(0.4, '#57314a');
        gradient.addColorStop(1, '#234626');
      } else if (t === 'neon') {
        gradient = ctx.createLinearGradient(0, 0, W, H);
        gradient.addColorStop(0, '#0c1020');
        gradient.addColorStop(0.5, '#12192b');
        gradient.addColorStop(1, '#091018');
      } else if (t === 'desert') {
        gradient = ctx.createLinearGradient(0, 0, 0, H);
        gradient.addColorStop(0, '#5d3d23');
        gradient.addColorStop(0.45, '#74522c');
        gradient.addColorStop(1, '#7d6b31');
      } else {
        gradient = ctx.createLinearGradient(0, 0, 0, H);
        gradient.addColorStop(0, '#18321c');
        gradient.addColorStop(0.4, '#1b4720');
        gradient.addColorStop(1, '#0d2410');
      }

      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);
      drawScenery();
      drawTrack();
      drawParticles();
    }

    function drawScenery() {
      const s = track.map.scenery;
      for (let i = 0; i < track.samples.length; i += 8) {
        const p = track.samples[i];
        const nx = -Math.sin(p.tangent);
        const ny = Math.cos(p.tangent);
        const offset = track.roadWidth * 0.9 + 36 + (i % 5) * 6;
        const x = p.x + nx * offset;
        const y = p.y + ny * offset;

        if (s === 'lights') {
          ctx.fillStyle = i % 16 < 8 ? 'rgba(114,215,255,0.24)' : 'rgba(255,93,188,0.24)';
          ctx.beginPath();
          ctx.arc(x, y, 6 + (i % 3), 0, Math.PI * 2);
          ctx.fill();
        } else if (s === 'rocks') {
          ctx.fillStyle = 'rgba(65,41,21,0.34)';
          ctx.beginPath();
          ctx.arc(x, y, 7 + (i % 4), 0, Math.PI * 2);
          ctx.fill();
        } else if (s === 'palms') {
          ctx.fillStyle = 'rgba(24,69,31,0.5)';
          ctx.beginPath();
          ctx.arc(x, y, 8, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = 'rgba(88,60,27,0.45)';
          ctx.fillRect(x - 1.5, y + 3, 3, 9);
        } else {
          ctx.fillStyle = 'rgba(13,47,16,0.5)';
          ctx.beginPath();
          ctx.arc(x, y, 7 + (i % 3), 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawTrack() {
      ctx.save();
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';

      ctx.beginPath();
      for (let i = 0; i < track.samples.length; i++) {
        const p = track.samples[i];
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.closePath();

      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = track.roadWidth + 8;
      ctx.stroke();

      ctx.strokeStyle = '#2f343b';
      ctx.lineWidth = track.roadWidth;
      ctx.stroke();

      ctx.strokeStyle = 'rgba(255,255,255,0.42)';
      ctx.setLineDash([18, 18]);
      ctx.lineWidth = 2.6;
      ctx.stroke();
      ctx.setLineDash([]);

      const start = centerPoint(-Math.PI / 2);
      const tangent = tangentAngleOnTrack(-Math.PI / 2);
      const nx = -Math.sin(tangent);
      const ny = Math.cos(tangent);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 4;
      for (let i = -1.5; i <= 1.5; i += 1) {
        const o = i * 16;
        ctx.beginPath();
        ctx.moveTo(start.x + nx * o - Math.cos(tangent) * track.roadWidth * 0.5, start.y + ny * o - Math.sin(tangent) * track.roadWidth * 0.5);
        ctx.lineTo(start.x + nx * o + Math.cos(tangent) * track.roadWidth * 0.5, start.y + ny * o + Math.sin(tangent) * track.roadWidth * 0.5);
        ctx.stroke();
      }

      ctx.fillStyle = 'rgba(255,255,255,0.78)';
      for (let i = 18; i < track.samples.length; i += 42) {
        const p = track.samples[i];
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.tangent);
        ctx.beginPath();
        ctx.moveTo(12, 0);
        ctx.lineTo(-8, -6);
        ctx.lineTo(-4, 0);
        ctx.lineTo(-8, 6);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      ctx.restore();
    }

    function roundRectPath(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life / 24);
        ctx.fillStyle = 'rgba(188,153,99,0.7)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawCar(car) {
      ctx.save();
      ctx.translate(car.x, car.y);
      ctx.rotate(car.angle + Math.PI / 2);
      ctx.shadowColor = 'rgba(0,0,0,0.34)';
      ctx.shadowBlur = 14;
      ctx.shadowOffsetY = 7;

      ctx.fillStyle = '#0f1115';
      roundRectPath(-car.w / 2, -car.h / 2, car.w, car.h, 7);
      ctx.fill();
      ctx.shadowColor = 'transparent';

      ctx.fillStyle = car.color;
      roundRectPath(-car.w / 2 + 2, -car.h / 2 + 2, car.w - 4, car.h - 4, 6);
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      roundRectPath(-car.w / 2 + 4, -car.h / 2 + 4, car.w - 8, 8, 4);
      ctx.fill();

      ctx.fillStyle = '#15181d';
      roundRectPath(-car.w / 2 - 2, -car.h / 2 + 4, 4, 9, 2); ctx.fill();
      roundRectPath(car.w / 2 - 2, -car.h / 2 + 4, 4, 9, 2); ctx.fill();
      roundRectPath(-car.w / 2 - 2, car.h / 2 - 13, 4, 9, 2); ctx.fill();
      roundRectPath(car.w / 2 - 2, car.h / 2 - 13, 4, 9, 2); ctx.fill();

      ctx.fillStyle = '#ffef9b';
      ctx.fillRect(-car.w / 2 + 3, -car.h / 2 + 1, 4, 3);
      ctx.fillRect(car.w / 2 - 7, -car.h / 2 + 1, 4, 3);

      ctx.fillStyle = '#ff6b6b';
      ctx.fillRect(-car.w / 2 + 3, car.h / 2 - 4, 4, 3);
      ctx.fillRect(car.w / 2 - 7, car.h / 2 - 4, 4, 3);

      if (!car.ai && (mouse.left || keys.up || keys.gas) && Math.abs(car.speed) > 0.2) {
        ctx.fillStyle = 'rgba(255, 194, 64, 0.68)';
        ctx.beginPath();
        ctx.moveTo(-4, car.h / 2 + 2);
        ctx.lineTo(0, car.h / 2 + 14 + Math.random() * 6);
        ctx.lineTo(4, car.h / 2 + 2);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();

      if (!car.ai) {
        ctx.save();
        ctx.translate(car.x, car.y - car.h / 2 - 18);
        ctx.fillStyle = 'rgba(74,208,255,0.96)';
        roundRectPath(-18, -10, 36, 16, 8);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('TÚ', 0, -2);
        ctx.beginPath();
        ctx.moveTo(0, 10);
        ctx.lineTo(-5, 3);
        ctx.lineTo(5, 3);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    function drawCursorGuide() {
      if (!mouse.active || overlay.style.display !== 'none') return;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.strokeStyle = 'rgba(255,255,255,0.16)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(mouse.x, mouse.y, 12, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mouse.x - 16, mouse.y);
      ctx.lineTo(mouse.x + 16, mouse.y);
      ctx.moveTo(mouse.x, mouse.y - 16);
      ctx.lineTo(mouse.x, mouse.y + 16);
      ctx.stroke();
    }

    function drawArrowToLeader() {
      if (!player || state.mode !== 'running') return;
      const ranking = [...cars].sort((a, b) => rankingValue(b) - rankingValue(a));
      if (ranking[0] === player) return;
      const leader = ranking[0];
      const dx = leader.x - player.x;
      const dy = leader.y - player.y;
      const ang = Math.atan2(dy, dx);
      const x = W - 88;
      const y = H - 90;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ang + Math.PI / 2);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath();
      ctx.moveTo(0, -24);
      ctx.lineTo(14, 16);
      ctx.lineTo(0, 8);
      ctx.lineTo(-14, 16);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function render() {
      drawBackground();
      if (cars.length) {
        for (const car of cars) drawCar(car);
      }
      drawArrowToLeader();
      drawCursorGuide();
    }

    function buyUpgrade(id) {
      const def = upgradeDefs.find(u => u.id === id);
      const level = getUpgradeLevel(id);
      if (!def || level >= def.max) return;
      const cost = getUpgradeCost(id);
      if (session.credits < cost) return;
      session.credits -= cost;
      session.upgrades[id] += 1;
      updateHUD();
      renderShop();
    }

    function renderMenu() {
      state.mode = 'menu';
      overlay.style.display = 'flex';
      countdownEl.style.display = 'none';
      overlayCard.innerHTML = `
        <div class="eyebrow">Arcade Racing</div>
        <h2>DRIFT CROWN</h2>
        <p>Las pistas mantienen el estilo del principio, pero ahora tienen curvas más amplias y fluidas, inspiradas en circuitos simplificados: más cambios de dirección, menos sensación de óvalo y menos giros cerrados. Mantengo la tienda, los puntos y las mejoras entre carreras.</p>
        <p>La dificultad cambia la velocidad, la trazada y la presión de la IA. Cada nueva carrera usa un circuito clásico con otra forma.</p>
        <div class="difficultyLabel">Elige dificultad</div>
        <div class="difficultyRow">
          <button class="diffBtn ${state.difficulty === 'easy' ? 'active' : ''}" data-difficulty="easy">Fácil</button>
          <button class="diffBtn ${state.difficulty === 'normal' ? 'active' : ''}" data-difficulty="normal">Normal</button>
          <button class="diffBtn ${state.difficulty === 'hard' ? 'active' : ''}" data-difficulty="hard">Difícil</button>
        </div>
        <div class="tagRow">
          <div class="tag">Mapa: ${track.map.name}</div>
          <div class="tag gold">Puntos: ${session.credits}</div>
          <div class="tag">Carrera ${session.raceNumber}</div>
        </div>
        <div class="mobileHint">En móvil usa los botones táctiles: izquierda para girar y derecha para acelerar o frenar.</div>
        <div class="btnRow">
          <button class="primary" id="startRaceBtn">Empezar carrera</button>
          <button id="changeMapBtn">Otro mapa</button>
        </div>
      `;

      overlayCard.querySelectorAll('[data-difficulty]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.difficulty = btn.dataset.difficulty;
          resetCars();
          updateHUD();
          renderMenu();
        });
      });
      overlayCard.querySelector('#startRaceBtn').addEventListener('click', startRace);
      overlayCard.querySelector('#changeMapBtn').addEventListener('click', () => {
        chooseRandomMap();
        resetCars();
        renderMenu();
      });
    }

    function renderShop() {
      const result = state.result;
      overlay.style.display = 'flex';
      const itemsHtml = upgradeDefs.map(def => {
        const level = getUpgradeLevel(def.id);
        const maxed = level >= def.max;
        const nextCost = maxed ? 'MAX' : getUpgradeCost(def.id);
        const canBuy = !maxed && session.credits >= getUpgradeCost(def.id);
        const dots = Array.from({ length: def.max }, (_, i) => `<div class="levelDot ${i < level ? 'on' : ''}"></div>`).join('');
        return `
          <div class="shopItem">
            <div class="shopItemTop">
              <div>
                <h3>${def.title}</h3>
                <small>Nivel ${level} / ${def.max}</small>
              </div>
              <small>${maxed ? 'Mejora completa' : 'Siguiente: ' + nextCost + ' pts'}</small>
            </div>
            <p>${def.desc}</p>
            <div class="levelBar">${dots}</div>
            <div class="costLine">
              <span>${maxed ? 'Máximo alcanzado' : 'Coste: ' + nextCost + ' pts'}</span>
              <button class="${canBuy ? 'primary' : ''}" data-upgrade="${def.id}" ${canBuy ? '' : 'disabled'}>${maxed ? 'MAX' : 'Comprar'}</button>
            </div>
          </div>
        `;
      }).join('');

      overlayCard.innerHTML = `
        <div class="eyebrow">Tienda</div>
        <h2>${result.position === 1 ? '¡Victoria!' : 'Carrera terminada'}</h2>
        <p>Has terminado en <strong>${track.map.name}</strong>. Gasta tus puntos en mejoras antes de la siguiente carrera.</p>
        <div class="raceSummary">
          <div class="summaryBox"><span>Posición</span><strong>${result.position} / 4</strong></div>
          <div class="summaryBox"><span>Tiempo</span><strong>${formatTime(result.time)}</strong></div>
          <div class="summaryBox"><span>Ganados</span><strong>+${result.earned}</strong></div>
          <div class="summaryBox"><span>Total</span><strong>${session.credits}</strong></div>
        </div>
        <div class="shopGrid">${itemsHtml}</div>
        <div class="btnRow">
          <button class="primary" id="nextRaceBtn">Siguiente carrera</button>
          <button id="menuBtn">Volver al menú</button>
        </div>
      `;

      overlayCard.querySelectorAll('[data-upgrade]').forEach(btn => {
        btn.addEventListener('click', () => buyUpgrade(btn.dataset.upgrade));
      });
      overlayCard.querySelector('#nextRaceBtn').addEventListener('click', () => {
        session.raceNumber += 1;
        chooseRandomMap();
        resetCars();
        startRace();
      });
      overlayCard.querySelector('#menuBtn').addEventListener('click', () => {
        chooseRandomMap();
        resetCars();
        renderMenu();
      });
    }

    async function startRace() {
      raceToken += 1;
      const token = raceToken;
      resetCars();
      overlay.style.display = 'none';
      state.mode = 'countdown';
      updateHUD();
      countdownEl.style.display = 'flex';

      const seq = ['3', '2', '1', 'GO!'];
      for (const item of seq) {
        if (token !== raceToken) return;
        countdownEl.textContent = item;
        await new Promise(resolve => setTimeout(resolve, item === 'GO!' ? 450 : 650));
      }

      if (token !== raceToken) return;
      countdownEl.style.display = 'none';
      state.mode = 'running';
      startTime = performance.now();
      elapsed = 0;
      updateHUD();
    }

    function finishRace() {
      const pos = rankingPosition();
      const earned = computeReward(pos);
      session.credits += earned;
      state.result = { position: pos, earned, time: elapsed };
      state.mode = 'shop';
      updateHUD();
      renderShop();
    }

    function loop(ts) {
      if (state.mode === 'running') {
        elapsed = ts - startTime;
        movePlayer(player);
        for (const rival of rivals) moveAI(rival);
        for (const car of cars) updateCarPhysics(car);
        resolveCarCollisions();
        updateHUD();
      }
      updateParticles();
      render();
      requestAnimationFrame(loop);
    }

    function setKeyFromCode(code, pressed) {
      if (code === 'ArrowUp' || code === 'KeyW') keys.up = pressed;
      if (code === 'ArrowDown' || code === 'KeyS') keys.down = pressed;
      if (code === 'ArrowLeft' || code === 'KeyA') keys.left = pressed;
      if (code === 'ArrowRight' || code === 'KeyD') keys.right = pressed;
      if (code === 'Space') keys.gas = pressed;
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyR') {
        if (state.mode === 'running' || state.mode === 'countdown') startRace();
        return;
      }
      setKeyFromCode(e.code, true);
    });
    window.addEventListener('keyup', (e) => setKeyFromCode(e.code, false));

    canvas.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
    });
    canvas.addEventListener('mousedown', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
      if (e.button === 0) mouse.left = true;
      if (e.button === 2) mouse.right = true;
    });
    window.addEventListener('mouseup', (e) => {
      if (e.button === 0) mouse.left = false;
      if (e.button === 2) mouse.right = false;
    });
    canvas.addEventListener('mouseleave', () => {
      mouse.left = false;
      mouse.right = false;
    });
    canvas.addEventListener('touchstart', () => {
      mouse.active = false;
    }, { passive: true });
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    function bindTouchButton(el, key) {
      const on = (ev) => {
        ev.preventDefault();
        keys[key] = true;
        el.classList.add('active');
      };
      const off = (ev) => {
        ev.preventDefault();
        keys[key] = false;
        el.classList.remove('active');
      };
      el.addEventListener('pointerdown', on);
      el.addEventListener('pointerup', off);
      el.addEventListener('pointercancel', off);
      el.addEventListener('pointerleave', off);
    }

    document.querySelectorAll('.touchBtn[data-key]').forEach(btn => bindTouchButton(btn, btn.dataset.key));
    window.addEventListener('resize', resize);

    buildTrack();
    resetCars();
    updateHUD();
    renderMenu();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
